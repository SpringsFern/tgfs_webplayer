<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ group.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #ffffff;
            color: #000;
        }

        h2 {
            margin-bottom: 10px;
        }

        .group-info {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .file-list {
            border-top: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            margin-bottom: 15px;
        }

        .file-item {
            cursor: pointer;
            padding: 5px 0;
        }

        .file-item:hover {
            background: #f2f2f2;
        }

        .preview-box {
            margin-top: 15px;
        }

        img {
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            display: block;
        }

        .download a {
            text-decoration: none;
            border: 1px solid #000;
            padding: 5px 10px;
            background: #f0f0f0;
            color: #000;
        }

        .download a:hover {
            background: #e0e0e0;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h2>{{ group.name }}</h2>

<div class="group-info">
    <div><strong>Group ID:</strong> {{ group.group_id }}</div>
    <div><strong>User ID:</strong> {{ group.user_id }}</div>
    {% if group.created_at %}
        <div><strong>Created:</strong> {{ group.created_at }}</div>
    {% endif %}
    <div><strong>Total Files:</strong> {{ files|length }}</div>
</div>

<div class="file-list">
    {% for file in files %}
        <div class="file-item"
             onclick="showFile({{ loop.index0 }})">
            {{ file.file_name }} ({{ human_bytes(file.file_size) }})
        </div>
    {% endfor %}
</div>

<div id="previewContainer" class="preview-box"></div>

<footer>
    <a href="https://github.com/SpringsFern/TG-FileStream">TG-FileStream</a>
</footer>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const files = [
{% for file in files %}
{
    id: {{ file.id }},
    name: {{ file.file_name|tojson }},
    size: "{{ human_bytes(file.file_size) }}",
    mime: "{{ file.mime_type }}",
    tag: "{{ file.mime_type.split('/')[0] if file.mime_type else '' }}",
    url: "{{ Config.PUBLIC_URL }}/dl/{{ make_token(group.user_id, file.id) }}"
}{% if not loop.last %},{% endif %}
{% endfor %}
];

function showFile(index) {
    const file = files[index];
    const container = document.getElementById("previewContainer");

    let html = `
        <div>
            <div><strong>Name:</strong> ${file.name}</div>
            <div><strong>ID:</strong> ${file.id}</div>
            <div><strong>Size:</strong> ${file.size}</div>
            <div><strong>MIME:</strong> ${file.mime}</div>
        </div>
    `;

    if (file.tag === "video") {
        html += `
            <video id="player" controls preload="metadata">
                <source src="${file.url}" type="${file.mime}">
            </video>
        `;
    } else if (file.tag === "audio") {
        html += `
            <audio id="player" controls preload="metadata">
                <source src="${file.url}" type="${file.mime}">
            </audio>
        `;
    } else if (file.tag === "image") {
        html += `<img src="${file.url}" alt="${file.name}">`;
    } else {
        html += `<p>No inline preview available.</p>`;
    }

    html += `
        <div class="download" style="margin-top:10px;">
            <a href="${file.url}" download>Download</a>
        </div>
    `;

    container.innerHTML = html;

    const player = document.querySelector('#player');
    if (player) {
        new Plyr(player);
    }
}
</script>

</body>
</html>
