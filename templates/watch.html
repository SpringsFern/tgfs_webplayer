<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }}</title>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #ffffff;
            color: #000;
        }

        h2 {
            margin-bottom: 10px;
            word-break: break-all;
        }

        .info {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .info span {
            display: block;
            margin: 2px 0;
        }

        img {
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            display: block;
        }

        .download {
            margin-top: 15px;
        }

        .download a {
            text-decoration: none;
            border: 1px solid #000;
            padding: 5px 10px;
            background: #f0f0f0;
            color: #000;
        }

        .download a:hover {
            background: #e0e0e0;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h2>{{ file_name }}</h2>

<div class="info">
    <span><strong>ID:</strong> {{ id }}</span>
    <span><strong>User:</strong> {{ user_id }}</span>
    <span><strong>DC:</strong> {{ dc_id }}</span>
    <span><strong>Size:</strong> {{ file_size }}</span>
    <span><strong>MIME:</strong> {{ mime_type }}</span>
</div>

{% if tag == "video" %}
    <video id="player" controls playsinline preload="metadata">
        <source src="{{ url }}" type="{{ mime_type }}">
    </video>

{% elif tag == "audio" %}
    <audio id="player" controls preload="metadata">
        <source src="{{ url }}" type="{{ mime_type }}">
    </audio>

{% elif tag == "image" %}
    <img src="{{ url }}" alt="{{ file_name }}">

{% else %}
    <p>No inline preview available.</p>
{% endif %}

<div class="download">
    <a href="{{ url }}" download>Download</a>
</div>

<footer>
    <a href="https://github.com/SpringsFern/TG-FileStream">TG-FileStream</a>
</footer>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const player = document.querySelector('#player');
        if (player) {
            new Plyr(player);
        }
    });
</script>

</body>
</html>
